# Daily signal automation config.
#
# Defaults are conservative:
# - analysis is not triggered unless enabled
# - auto-paper runs as dry-run unless execute is true
# - real-money trading is not part of this pipeline

market: TH
db_path: state/market_cache.db
theses_dir: state/theses
signal_files:
  enabled: true
  patterns:
    - state/signals/*.json
    - state/signals/*.yaml
    - reports/vcp_screener_*.json
    - reports/canslim_screener_*.json
    - reports/thai_swing_*.json
  max_files_per_pattern: 3
output_dir: reports/daily-signal-pipeline
horizons: [5, 20, 60]

analysis:
  enabled: false
  url: http://127.0.0.1:5050/api/run
  timeout_seconds: 900

auto_paper:
  enabled: true
  execute: true
  min_score: 80
  max_age_days: 2
  max_new_positions: 4
  max_open_positions: 4
  high_score_override_min: 90
  max_open_positions_with_override: 4
  shares: 100
  derive_missing_risk: true
  default_stop_pct: 8
  target_r: 2
  # InnovestX online cash-balance fee model. The simulator applies these per side.
  # slippage_bps is an explicit paper-trading assumption, not a broker fee.
  fee_model:
    broker: innovestx
    commission_pct: 0.15
    trading_fee_pct: 0.005
    clearing_fee_pct: 0.001
    vat_pct: 7
    slippage_bps: 5
  # Paper-account risk controls. These values are not connected to real money.
  account_size: 30000
  risk_per_trade_pct: 1
  max_position_pct: 20
  max_portfolio_heat_pct: 3
  board_lot_size: 100
  source_rules:
    thai-swing-dip:
      max_age_days: 1
      target_r: 1.0
      stop_pct_cap: 2.5
      take_profit_r: 1.0
      max_hold_days: 2
      time_stop_min_r: 0.2
    thai-swing-momentum:
      min_score: 85
      max_age_days: 0
      target_r: 0.9
      stop_pct_cap: 4.0
      take_profit_r: 1.0
      max_hold_days: 3
      time_stop_min_r: 0.0
    vcp-screener:
      target_r: 1.5
      stop_pct_cap: 5.0
      take_profit_r: 1.5
      max_hold_days: 7
      time_stop_min_r: 0.5
